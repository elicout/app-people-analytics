description: >
  People Analytics data model. All queries against employees MUST filter with
  CONTAINS(manager_chain, '<user_email>') AND email != '<user_email>'.
  For turnover, use CONTAINS(manager_chain, '<user_email>'). Never bypass this.

tables:
  employees:
    topic: "Headcount e estrutura da equipe — distribuição por cargo, departamento, tempo de empresa e salário"
    description: >
      One row per active or on-leave employee. Use this table for headcount,
      role distribution, salary costs, tenure analysis, and org structure.
      Always apply the manager_chain RLS filter.
    columns:
      id: Unique employee identifier.
      team_id: The team this employee belongs to.
      name: Full name of the employee.
      role: Job title / role (e.g. "Senior Engineer", "Designer").
      department: Department name (e.g. "Engineering", "Product").
      email: Work email address.
      hire_date: Date the employee joined the company (DATE).
      tenure_months: Integer months since hire_date.
      salary_usd: Monthly gross salary in USD.
      manager_id: ID of this employee's direct manager.
      manager_chain: "Comma-separated list of all manager emails up the hierarchy. Use CONTAINS(manager_chain, '<user_email>') to scope visibility."
      status: One of 'active', 'on_leave', 'terminated'.

  performance:
    topic: "Performance — pontuações mensais, ratings e metas concluídas por colaborador"
    description: >
      Monthly performance review records per employee. Use for performance
      trends, score distributions, goal completion rates, and ratings.
    columns:
      employee_id: References employees.id.
      period: Month in 'YYYY-MM' format (e.g. '2024-06').
      score: Numeric performance score 0-100. Higher is better.
      goals_completed: Number of goals the employee completed this period.
      goals_total: Total goals assigned this period (always 8).
      rating: One of 'exceeds', 'meets', 'below'.

  attendance:
    topic: "Assiduidade — taxa de presença, ausências e padrões de faltas"
    description: >
      Daily attendance records per employee. Use for attendance rates,
      absenteeism analysis, and leave patterns.
    columns:
      employee_id: References employees.id.
      date: Calendar date (DATE).
      status: One of 'present', 'absent', 'late', 'on_leave'.
      hours_worked: Decimal hours worked that day (0 if absent).

  productivity:
    topic: "Produtividade — tarefas concluídas, pendências e taxa de entrega no prazo"
    description: >
      Monthly productivity metrics per employee.
    columns:
      employee_id: References employees.id.
      period: Month in 'YYYY-MM' format.
      tasks_completed: Number of tasks completed this period.
      tasks_pending: Number of tasks still pending at period end.
      delivery_on_time_rate: Fraction 0-1 of tasks delivered on time.
      quality_score: Quality of output score 0-100.

  overtime:
    topic: "Horas extras — volume acumulado por colaborador e custo total"
    description: >
      Monthly overtime records per employee.
    columns:
      employee_id: References employees.id.
      period: Month in 'YYYY-MM' format.
      regular_hours: Standard working hours in the month (typically 160).
      overtime_hours: Extra hours worked beyond regular_hours.
      overtime_cost_usd: Cost of overtime in USD (1.5x hourly rate).

  turnover:
    topic: "Rotatividade — saídas, motivos e tendências da equipe"
    description: >
      Records of employees who have left. Filter with CONTAINS(manager_chain, '<user_email>').
    columns:
      employee_id: ID of the departed employee.
      team_id: Team they belonged to.
      termination_date: Date they left (DATE).
      reason: One of 'voluntary', 'involuntary', 'retirement'.
      manager_chain: Same chain as in employees — use for RLS.

  time_bank:
    topic: "Banco de Horas (BH) — horas acumuladas e compensadas por colaborador"
    description: >
      Monthly Banco de Horas (BH) records per employee. Tracks overtime hours credited to the
      bank (hours_accrued) and compensatory time already taken (hours_compensated). Join with
      employees and apply the standard manager_chain RLS filter. To compute the outstanding
      balance use SUM(hours_accrued) - SUM(hours_compensated); for the compensation rate use
      SUM(hours_compensated) / NULLIF(SUM(hours_accrued), 0) * 100.
    columns:
      employee_id: References employees.id.
      period: Month in 'YYYY-MM' format.
      hours_accrued: Overtime hours credited to the time bank this period.
      hours_compensated: Hours taken as compensatory time off this period.

metrics:
  attendance_rate:
    description: Percentage of working days an employee was present.
    sql: "COUNT(CASE WHEN status IN ('present','late') THEN 1 END) * 1.0 / COUNT(*)"

  avg_performance_score:
    description: Average performance score across employees or periods.
    sql: "AVG(score) FROM performance JOIN employees e ON ... WHERE CONTAINS(e.manager_chain,?)"

  total_salary_cost:
    description: Sum of monthly salaries for visible employees.
    sql: "SUM(salary_usd) FROM employees WHERE CONTAINS(manager_chain,'{user_email}') AND email!='{user_email}' AND status!='terminated'"

  turnover_rate:
    description: Number of departures divided by headcount.
    sql: "COUNT(*) FROM turnover WHERE CONTAINS(manager_chain,'{user_email}')"

few_shot_examples:
  - question: "Quantas pessoas tenho na minha equipe?"
    sql: >
      SELECT COUNT(*) AS total
      FROM employees
      WHERE CONTAINS(manager_chain, '{user_email}') AND email != '{user_email}'
        AND status != 'terminated';

  - question: "Quem tem mais horas extras este mês?"
    sql: >
      SELECT e.name, o.overtime_hours
      FROM overtime o
      JOIN employees e ON e.id = o.employee_id
      WHERE CONTAINS(e.manager_chain, '{user_email}') AND e.email != '{user_email}'
        AND o.period = '2024-06'
      ORDER BY o.overtime_hours DESC
      LIMIT 5;

  - question: "Qual é a pontuação média de performance?"
    sql: >
      SELECT AVG(p.score) as avg_score
      FROM performance p
      JOIN employees e ON e.id = p.employee_id
      WHERE CONTAINS(e.manager_chain, '{user_email}') AND e.email != '{user_email}';

  - question: "Quais colaboradores estão abaixo das expectativas de performance?"
    sql: >
      SELECT e.name, AVG(p.score) as avg_score
      FROM performance p
      JOIN employees e ON e.id = p.employee_id
      WHERE CONTAINS(e.manager_chain, '{user_email}') AND e.email != '{user_email}'
      GROUP BY e.id, e.name
      HAVING AVG(p.score) < 70
      ORDER BY avg_score ASC;

  - question: "Qual é o custo total de salários?"
    sql: >
      SELECT SUM(salary_usd) as total_cost
      FROM employees
      WHERE CONTAINS(manager_chain, '{user_email}') AND email != '{user_email}'
        AND status != 'terminated';

  - question: "Mostre a distribuição de tempo de empresa."
    sql: >
      SELECT
        CASE
          WHEN tenure_months < 12 THEN '< 1 year'
          WHEN tenure_months < 24 THEN '1-2 years'
          WHEN tenure_months < 36 THEN '2-3 years'
          ELSE '3+ years'
        END as bucket,
        COUNT(*) as count
      FROM employees
      WHERE CONTAINS(manager_chain, '{user_email}') AND email != '{user_email}'
      GROUP BY bucket;
